# ==============================================
# REPORT SERVICE - APPLICATION CONFIG
# ==============================================

server:
  port: ${SERVER_PORT:8084}
  shutdown: graceful
  forward-headers-strategy: framework

spring:
  application:
    name: report-service

  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    # Password MUST be provided via SPRING_DATASOURCE_PASSWORD (no insecure fallback)
    # Docker: will typically be provided via SPRING_DATASOURCE_PASSWORD from environment
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/samt_report?serverTimezone=UTC&ApplicationName=report-service}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      # In secure deployments, prefer Docker secret `redis_password` via Spring configtree.
      # Local/dev can still provide REDIS_PASSWORD via .env.
      password: ${redis_password:${REDIS_PASSWORD:?⚠️ REDIS_PASSWORD is required for security - set in .env file}}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: ${SHOW_SQL:false}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${GATEWAY_INTERNAL_JWKS_URI:http://api-gateway:8080/.well-known/internal-jwks.json}

security:
  internal-jwt:
    issuer: ${GATEWAY_INTERNAL_JWT_ISSUER:samt-gateway}
    expected-service: ${GATEWAY_INTERNAL_JWT_EXPECTED_SERVICE:api-gateway}
    clock-skew-seconds: ${INTERNAL_JWT_CLOCK_SKEW_SECONDS:30}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.example: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: ${SQL_LOG_LEVEL:WARN}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    enabled: true

---
#grpc
grpc:
  client:
    default:
      negotiation-type: TLS
      security:
        trustCertCollection: file:/certs/ca.crt
    sync-service:
      address: static://${SYNC_SERVICE_GRPC_HOST:sync-service}:${SYNC_SERVICE_GRPC_PORT:9094}
      enable-keep-alive: true
      keep-alive-time: 30s
      keep-alive-timeout: 10s
      enable-retry: true
      max-retry-attempts: 3
      default-load-balancing-policy: round_robin
      immediate-connect-timeout: 5s

ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:8083}
    timeout: ${AI_SERVICE_TIMEOUT_MS:5000}

report:
  integrations:
    user-group-base-url: ${USER_GROUP_SERVICE_BASE_URL:http://user-group-service:8082}
    project-config-base-url: ${PROJECT_CONFIG_SERVICE_BASE_URL:http://project-config-service:8084}

resilience4j:
  retry:
    instances:
      syncGrpc:
        max-attempts: 3
        wait-duration: 300ms
      analysisApi:
        max-attempts: 3
        wait-duration: 300ms
        retry-exceptions:
          - com.example.reportservice.service.AiClient$TransientAiUpstreamException
        ignore-exceptions:
          - com.example.reportservice.web.UpstreamServiceException
  circuitbreaker:
    instances:
      syncGrpc:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
      analysisApi:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
    
# ==============================================
# DOCKER PROFILE
# ==============================================
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgres-report:5432/samt_report?serverTimezone=UTC&ApplicationName=report-service

  data:
    redis:
      host: redis

server:
  port: 8080

logging:
  level:
    root: INFO
    com.example: INFO
