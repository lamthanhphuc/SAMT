# ==============================================
# KUBERNETES SECRETS MANAGEMENT (TEMPLATE)
# ==============================================
# DO NOT APPLY DIRECTLY.
#
# This file is a TEMPLATE and contains placeholder secret values.
# Replace the placeholders with real base64-encoded values (or use an
# external secret manager such as External Secrets/CSI/Vault) before applying.
#
# Usage:
#   1. Copy this file (or render it from your pipeline) and replace:
#        - BASE64_ENCODED_PASSWORD
#        - BASE64_ENCODED_SECRET
#   2. kubectl apply -f <rendered-secrets>.yml
#   3. kubectl apply -f samt-deployment.yml

apiVersion: v1
kind: Namespace
metadata:
  name: samt-production
  labels:
    name: samt-production
    security.policy: strict
---
# ==============================================
# DATABASE CREDENTIALS
# ==============================================
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: samt-production
  annotations:
    rotation.policy: "30d"
    last-rotated: "2026-02-27T00:00:00Z"
type: Opaque
data:
  username: cG9zdGdyZXM=  # postgres
  # Generate with: echo -n "$(openssl rand -base64 32)" | base64
  password: BASE64_ENCODED_PASSWORD  # TEMPLATE PLACEHOLDER
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: samt-production
  annotations:
    rotation.policy: "30d"
    last-rotated: "2026-02-27T00:00:00Z"
type: Opaque
data:
  # Generate with: echo -n "$(openssl rand -base64 32)" | base64
  password: BASE64_ENCODED_PASSWORD  # TEMPLATE PLACEHOLDER
---
# ==============================================
# APPLICATION SECRETS
# ==============================================
apiVersion: v1
kind: Secret
metadata:
  name: jwt-config
  namespace: samt-production
  annotations:
    rotation.policy: "7d"  # JWT secrets rotate weekly
    last-rotated: "2026-02-27T00:00:00Z"
type: Opaque
data:
  # Generate with: echo -n "$(openssl rand -base64 64)" | base64
  secret: BASE64_ENCODED_SECRET  # TEMPLATE PLACEHOLDER
---
apiVersion: v1
kind: Secret
metadata:
  name: gateway-internal
  namespace: samt-production
  annotations:
    rotation.policy: "30d"
    last-rotated: "2026-02-27T00:00:00Z" 
type: Opaque
data:
  # Generate with: echo -n "$(openssl rand -base64 32)" | base64
  secret: BASE64_ENCODED_SECRET  # TEMPLATE PLACEHOLDER
---
# ==============================================
# TLS CERTIFICATES (EXTERNAL CERT-MANAGER)
# ==============================================
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: samt-tls
  namespace: samt-production
spec:
  secretName: samt-tls-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
    group: cert-manager.io
  dnsNames:
  - api.samt.production.com
  - backup-api.samt.production.com
---
# ==============================================
# NETWORK POLICIES (ZERO-TRUST)
# ==============================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: data-tier-isolation
  namespace: samt-production
spec:
  podSelector:
    matchLabels:
      tier: data
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          tier: app  # Only app tier can access data tier
    ports:
    - protocol: TCP
      port: 5432  # PostgreSQL
    - protocol: TCP  
      port: 6379  # Redis
  # No egress rules: deny all outbound traffic from data tier.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: app-tier-isolation
  namespace: samt-production
spec:
  podSelector:
    matchLabels:
      tier: app
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          tier: web  # Only web tier can access app tier
    ports:
    - protocol: TCP
      port: 8081  # identity-service
    - protocol: TCP
      port: 8082  # user-group-service
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - to:
    - podSelector:
        matchLabels:
          tier: data  # App tier can access data tier
    ports:
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 6379
  - to:
    - podSelector:
        matchLabels:
          tier: app
    ports:
    - protocol: TCP
      port: 9091
    - protocol: TCP
      port: 9092
    - protocol: TCP
      port: 9093
    - protocol: TCP
      port: 9094
    - protocol: TCP
      port: 9095
    - protocol: TCP
      port: 29092
  - to:
    - podSelector:
        matchLabels:
          tier: web
    ports:
    - protocol: TCP
      port: 8080
---
# ==============================================
# SECRET ROTATION JOB (AUTOMATED)
# ==============================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-rotator
  namespace: samt-production
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-rotator
  namespace: samt-production
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["postgres-credentials", "redis-credentials"]
    verbs: ["get","create","update","patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: [
      "identity-service",
      "user-group-service",
      "project-config-service",
      "sync-service",
      "analysis-service",
      "report-service",
      "notification-service"
    ]
    verbs: ["get","patch","watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secret-rotator
  namespace: samt-production
subjects:
  - kind: ServiceAccount
    name: secret-rotator
    namespace: samt-production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: secret-rotator
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: secret-rotator
  namespace: samt-production
spec:
  schedule: "0 2 * * 0"  # Every Sunday at 2 AM
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: secret-rotator
          containers:
          - name: rotator
            image: samt/secret-rotator@sha256:REPLACE_WITH_PUBLISHED_DIGEST
            securityContext:
              runAsNonRoot: true
              runAsUser: 65534
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
            env:
            - name: VAULT_ADDR
              value: "https://vault.internal.com"
            - name: NAMESPACE
              value: "samt-production"
            command:
            - /bin/sh
            - -c
            - |
              set -eu

              # Rotate secrets in-place (supported by kubectl); avoid unsupported flags like --from-secret.
              # Namespace-scoping is explicit to keep RBAC least-privilege and prevent accidental cross-namespace changes.

              # Rotate PostgreSQL password
              NEW_PG_PASS=$(openssl rand -base64 32)
              kubectl -n "$NAMESPACE" create secret generic postgres-credentials \
                --from-literal=username=postgres \
                --from-literal=password="$NEW_PG_PASS" \
                --dry-run=client -o yaml | kubectl -n "$NAMESPACE" apply -f -

              # Rotate Redis password
              NEW_REDIS_PASS=$(openssl rand -base64 32)
              kubectl -n "$NAMESPACE" create secret generic redis-credentials \
                --from-literal=password="$NEW_REDIS_PASS" \
                --dry-run=client -o yaml | kubectl -n "$NAMESPACE" apply -f -

              # Trigger a rollout so pods re-read updated secrets (mounted env/config).
              RESTART_TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              for svc in identity-service user-group-service project-config-service sync-service analysis-service report-service notification-service; do
                kubectl -n "$NAMESPACE" patch deployment "$svc" -p "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"secret-rotator/restartedAt\":\"$RESTART_TS\"}}}}}"
              done

              # Basic health signal using rollout status on scoped deployment names.
              for svc in identity-service user-group-service project-config-service sync-service analysis-service report-service notification-service; do
                kubectl -n "$NAMESPACE" rollout status deployment "$svc" --timeout=180s
              done
              echo "Secret rotation completed successfully"
          restartPolicy: OnFailure