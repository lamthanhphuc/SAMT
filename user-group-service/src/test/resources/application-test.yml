spring:
  datasource:
    url: jdbc:h2:mem:usergroup_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  kafka:
    enabled: false
grpc:
  server:
    port: 0
  client:
    identity-service:
      address: static://localhost:0
      negotiationType: TLS
      security:
        trustCertCollection: ${GRPC_TRUST_CERT:file:/etc/certs/ca.crt}
        clientCertChain: ${GRPC_CERT_CHAIN:file:/etc/certs/tls.crt}
        clientPrivateKey: ${GRPC_PRIVATE_KEY:file:/etc/certs/tls.key}

