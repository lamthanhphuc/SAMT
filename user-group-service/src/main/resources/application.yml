# ==============================================
# USER & GROUP SERVICE - APPLICATION CONFIG
# ==============================================

server:
  port: ${SERVER_PORT:8082}
  shutdown: graceful
  forward-headers-strategy: framework

spring:
  application:
    name: usergroup-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/samt_usergroup}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    open-in-view: false
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true


  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${GATEWAY_INTERNAL_JWKS_URI:http://api-gateway:8080/.well-known/internal-jwks.json}

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    enabled: ${KAFKA_ENABLED:true}  # Default disabled for local dev
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: true
      group-id: usergroup-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.example.common.events
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.example.common.events.UserDeletedEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer



# gRPC
grpc:
  server:
    port: ${GRPC_SERVER_PORT:9095}
    keep-alive-time: 30s
    keep-alive-timeout: 10s
    permit-keep-alive-without-calls: true
    max-inbound-message-size: 4MB
    security:
      enabled: true
      certificateChain: file:/certs/server.crt
      privateKey: file:/certs/server.key
  client:
    default:
      negotiation-type: TLS
      security:
        trustCertCollection: file:/certs/ca.crt
    identity-service:
      address: dns:///identity-service:9091
      enable-keep-alive: true
      keep-alive-time: 30s
      keep-alive-timeout: 10s

# Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      identityService:
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        slidingWindowSize: 10
        minimumNumberOfCalls: 5

  retry:
    instances:
      identityService:
        maxAttempts: 3
        waitDuration: 500ms

# Management
management:
  endpoints:
    web:
      exposure:
        include: health,info

# Swagger
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    enabled: true

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.example.user_groupservice: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: ${SQL_LOG_LEVEL:WARN}
    org.hibernate.type.descriptor.sql: WARN
    io.grpc: WARN

---
# ==============================================
# DOCKER PROFILE
# ==============================================
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgres-usergroup:5432/samt_usergroup?serverTimezone=UTC&ApplicationName=usergroup-service
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  kafka:
    enabled: ${KAFKA_ENABLED:true}  # Enabled by default in Docker
    bootstrap-servers: kafka:29092

grpc:
  server:
    port: 9095  # Keep consistent gRPC port
  client:
    identity-service:
      address: dns:///identity-service:9091
      negotiation-type: PLAINTEXT

server:
  port: 8082  # Keep consistent REST API port

logging:
  level:
    root: INFO
    com.example.user_groupservice: INFO
    io.grpc: WARN
