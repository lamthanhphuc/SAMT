spring:
  jpa:
    hibernate:
      ddl-auto: validate
  datasource:
    password: ${SPRING_DATASOURCE_PASSWORD}

samt:
  secrets:
    datasource-password: ${SPRING_DATASOURCE_PASSWORD}

# Production hardening: expose only health; disable API docs.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

grpc:
  server:
    security:
      enabled: true
      clientAuth: REQUIRE
      certificateChain: classpath:certs/server.crt
      privateKey: classpath:certs/server.key
      trustCertCollection: classpath:certs/ca.crt
  client:
    default:
      negotiation-type: TLS
      security:
        certificateChain: classpath:certs/client.crt
        privateKey: classpath:certs/client.key
        trustCertCollection: classpath:certs/ca.crt
    identity-service:
      address: dns:///identity-service:9091
