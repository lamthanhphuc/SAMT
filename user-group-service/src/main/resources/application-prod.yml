spring:
  jpa:
    hibernate:
      ddl-auto: validate
  datasource:
    password: ${SPRING_DATASOURCE_PASSWORD}

samt:
  secrets:
    datasource-password: ${SPRING_DATASOURCE_PASSWORD}

# Production hardening: expose only health; disable API docs.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

grpc:
  server:
    security:
      enabled: true
      clientAuth: REQUIRE
      certificateChain: file:/certs/server.crt
      privateKey: file:/certs/server.key
      trustCertCollection: file:/certs/ca.crt
  client:
    default:
      negotiation-type: TLS
      security:
        certificateChain: file:/certs/client.crt
        privateKey: file:/certs/client.key
        trustCertCollection: file:/certs/ca.crt
    identity-service:
      address: dns:///identity-service:9091

logging:
  level:
    root: INFO
    com.example.user_groupservice: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN
    io.grpc: WARN
