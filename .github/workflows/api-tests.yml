name: API Tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  api-tests:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Prepare test environment
        run: |
          cp .env.test .env.runtime.test
          mkdir -p .local-certs
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out .local-certs/identity-jwt-private.pkcs8.pem
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out .local-certs/gateway-internal-jwt-private.pkcs8.pem
          echo "BASE_URL=http://localhost:9080" >> .env.runtime.test

      - name: Start backend stack
        run: docker compose -f config/docker/docker-compose.yml up -d

      - name: Wait for gateway health
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:9080/actuator/health >/dev/null; then
              echo "Gateway is up"
              exit 0
            fi
            sleep 5
          done
          echo "Gateway did not become healthy in time"
          docker compose ps
          exit 1

      - name: Run self-healing API pipeline
        env:
          BASE_URL: http://localhost:9080
          QA_SEED: 20260308
        run: npm run tests:self-heal:ci

      - name: Upload API artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-artifacts
          path: |
            docs/api/openapi.yaml
            tests/
            postman-collection.json
            .self-heal/reports/
            .self-heal/snapshots/

      - name: Tear down
        if: always()
        run: docker compose -f config/docker/docker-compose.yml down -v

