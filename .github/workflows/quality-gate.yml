name: Quality Gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-backend:
    name: Unit | Backend
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate local JWT keys for tests
        run: |
          mkdir -p .local-certs
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out .local-certs/identity-jwt-private.pkcs8.pem
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out .local-certs/gateway-internal-jwt-private.pkcs8.pem

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run backend unit tests with JaCoCo
        run: ./mvnw -T 1C -B -DskipITs=true -Dquality.reports.skip=false verify

      - name: Enforce backend coverage thresholds
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path

          report_path = Path('target/site/jacoco-aggregate/jacoco.xml')
          if not report_path.exists():
            raise SystemExit('JaCoCo aggregate report not found at target/site/jacoco-aggregate/jacoco.xml')

          root = ET.parse(report_path).getroot()
          counters = {counter.attrib.get('type'): counter for counter in root.findall('counter')}

          def ratio(counter_type):
            counter = counters.get(counter_type)
            if counter is None:
              raise SystemExit(f'{counter_type} counter not found in JaCoCo report')
            covered = int(counter.attrib['covered'])
            missed = int(counter.attrib['missed'])
            return covered / (covered + missed) if (covered + missed) else 0.0

          line_ratio = ratio('LINE')
          branch_ratio = ratio('BRANCH')

          line_threshold = 0.70
          branch_threshold = 0.60

          print(f'Backend LINE coverage: {line_ratio:.2%} (threshold {line_threshold:.0%})')
          print(f'Backend BRANCH coverage: {branch_ratio:.2%} (threshold {branch_threshold:.0%})')

          if line_ratio < line_threshold or branch_ratio < branch_threshold:
            raise SystemExit(1)
          PY

  unit-frontend:
    name: Unit | Frontend
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect frontend workspace
        id: frontend
        run: |
          if [ -f frontend/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node 20
        if: steps.frontend.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: steps.frontend.outputs.exists == 'true'
        run: npm --prefix frontend install

      - name: Frontend unit tests with coverage
        if: steps.frontend.outputs.exists == 'true'
        run: npm --prefix frontend run test:unit:coverage

      - name: Skip frontend unit checks (frontend repo not present)
        if: steps.frontend.outputs.exists != 'true'
        run: echo "No frontend workspace in this repository. Frontend checks run in FE-SAMT repo."

  api-fast:
    name: API | Smoke + Edge + Contract
    runs-on: ubuntu-24.04
    needs: [unit-backend, unit-frontend]
    env:
      BASE_URL: http://localhost:9080
      SCHEMATHESIS_SEED: '20260308'
      SCHEMATHESIS_STRICT: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Prepare environment
        run: |
          cp .env.example .env
          mkdir -p .local-certs
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out .local-certs/identity-jwt-private.pkcs8.pem
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out .local-certs/gateway-internal-jwt-private.pkcs8.pem
          python - <<'PY'
          import base64
          import secrets
          from pathlib import Path

          env_path = Path('.env')
          text = env_path.read_text(encoding='utf-8')
          text = text.replace('CHANGE_ME_STRONG_PASSWORD_HERE', secrets.token_urlsafe(18))
          text = text.replace('CHANGE_ME_256_BIT_KEY', base64.b16encode(secrets.token_bytes(32)).decode('ascii').lower())
          env_path.write_text(text, encoding='utf-8')
          with env_path.open('a', encoding='utf-8') as env_file:
            env_file.write(f"REDIS_PASSWORD={secrets.token_urlsafe(18)}\n")
          PY

      - name: Start backend stack
        run: docker compose up -d

      - name: Wait for API gateway health
        run: |
          for i in {1..90}; do
            if curl -fsS http://localhost:9080/actuator/health >/dev/null; then
              echo "Gateway healthy"
              exit 0
            fi
            sleep 5
          done
          docker compose ps
          exit 1

      - name: Run PR fast API suite
        run: |
          npm run tests:bootstrap
          npm run tests:fixtures
          npm run test:smoke
          npm run test:api:edge
          npm run tests:contract:strict

      - name: Teardown stack
        if: always()
        run: docker compose down -v
