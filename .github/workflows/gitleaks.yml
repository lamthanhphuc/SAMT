name: Secret scan (gitleaks)

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks detect
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --redact --verbose
