name: gitleaks

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  scan:
    name: Secret Scan
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml