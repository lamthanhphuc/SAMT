name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test-security:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Java 21 (Temurin)
        uses: actions/setup-java@99b8673ff64fbf99d8d325f52d9a5bdedb8483e9 # v4.2.1
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Maven verify (tests + enforcer + SBOM)
        run: bash ./mvnw -B verify

      - name: Upload SBOM (CycloneDX)
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: sbom-cyclonedx
          if-no-files-found: error
          path: |
            target/bom.json
            target/bom.xml

      - name: Cache OWASP Dependency-Check data
        uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4.0.2
        with:
          path: .cache/dependency-check
          key: dependency-check-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            dependency-check-${{ runner.os }}-

      - name: OWASP Dependency-Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: >-
          bash ./mvnw -B org.owasp:dependency-check-maven:12.2.0:check
          -DfailBuildOnCVSS=7
          -Dformat=ALL
          -DoutputDirectory=target/dependency-check
          -DdataDirectory=.cache/dependency-check
          -DnvdApiKey=${NVD_API_KEY}

      - name: Upload Dependency-Check report
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: dependency-check-report
          if-no-files-found: warn
          path: target/dependency-check

      - name: Build representative Docker image (api-gateway)
        run: docker build -f api-gateway/Dockerfile -t samt/api-gateway:ci .

      - name: Trivy scan (fail on HIGH,CRITICAL)
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # 0.34.2
        with:
          image-ref: samt/api-gateway:ci
          format: table
          exit-code: '1'
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: false
