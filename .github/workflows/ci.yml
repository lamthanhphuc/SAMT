name: Nightly Full Pipeline

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-full-${{ github.ref }}
  cancel-in-progress: false

jobs:
  unit-backend:
    name: Unit | Backend
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run backend unit tests
        run: ./mvnw -T 1C -B -DskipITs=true test

  unit-frontend:
    name: Unit | Frontend
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend install

      - name: Run frontend unit tests
        run: npm --prefix frontend run test:unit

  nightly-full:
    name: Nightly | Full QA
    runs-on: ubuntu-24.04
    needs: [unit-backend, unit-frontend]
    env:
      BASE_URL: http://localhost:9080
      SCHEMATHESIS_SEED: '20260308'
      SCHEMATHESIS_STRICT: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            qa/playwright/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('qa/playwright/package-lock.json') }}

      - name: Install dependencies
        run: |
          npm ci --no-audit --no-fund
          npm --prefix frontend ci --no-audit --no-fund
          npm --prefix qa/playwright ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npm --prefix qa/playwright exec playwright install --with-deps chromium

      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y gpg ca-certificates
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /etc/apt/keyrings/k6.gpg
          echo "deb [signed-by=/etc/apt/keyrings/k6.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Prepare environment
        run: |
          cp .env.example .env
          python - <<'PY'
          import base64
          import secrets
          from pathlib import Path

          env_path = Path('.env')
          text = env_path.read_text(encoding='utf-8')
          text = text.replace('CHANGE_ME_STRONG_PASSWORD_HERE', secrets.token_urlsafe(18))
          text = text.replace('CHANGE_ME_256_BIT_KEY', base64.b16encode(secrets.token_bytes(32)).decode('ascii').lower())
          env_path.write_text(text, encoding='utf-8')
          with env_path.open('a', encoding='utf-8') as env_file:
            env_file.write(f"REDIS_PASSWORD={secrets.token_urlsafe(18)}\n")
          PY

      - name: Start backend stack
        run: docker compose up -d

      - name: Wait for API gateway health
        run: |
          for i in {1..90}; do
            if curl -fsS http://localhost:9080/actuator/health >/dev/null; then
              echo "Gateway healthy"
              exit 0
            fi
            sleep 5
          done
          docker compose ps
          exit 1

      - name: Run nightly full suite
        run: |
          npm run tests:bootstrap
          npm run tests:fixtures
          npm run test:smoke
          npm run tests:regression:ci
          npm run tests:contract:strict
          mkdir -p logs
          npm run tests:fuzz | tee logs/fuzz-nightly.log || true
          npm run qa:testkit:e2e
          npm run qa:testkit:api
          npm run qa:testkit:security
          BASE_URL=http://localhost:9080 TEST_USERNAME=test TEST_PASSWORD=test bash scripts/smoke-test.sh
          k6 run qa/performance/performance-test.js --out json=performance-result.json --summary-export=performance-summary.json
          npm run qa:chaos

      - name: Upload nightly artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-artifacts
          if-no-files-found: warn
          path: |
            qa/playwright/playwright-report
            performance-result.json
            performance-summary.json
            logs/fuzz-nightly.log
            .self-heal/reports

      - name: Teardown stack
        if: always()
        run: docker compose down -v
