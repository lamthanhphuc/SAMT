name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test-security:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Java 21 (Temurin)
        uses: actions/setup-java@99b8673ff64fbf99d8d325f52d9a5bdedb8483e9 # v4.2.1
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Maven verify (tests + enforcer + SBOM)
        run: bash ./mvnw -B verify

      - name: Upload SBOM (CycloneDX)
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: sbom-cyclonedx
          if-no-files-found: error
          path: |
            target/bom.json
            target/bom.xml

      - name: Cache OWASP Dependency-Check data
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: .cache/dependency-check
          key: dependency-check-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            dependency-check-${{ runner.os }}-

      - name: OWASP Dependency-Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: >-
          bash ./mvnw -B org.owasp:dependency-check-maven:12.2.0:check
          -DfailBuildOnCVSS=7
          -Dformat=ALL
          -DoutputDirectory=target/dependency-check
          -DdataDirectory=.cache/dependency-check
          -DnvdApiKey=${NVD_API_KEY}

      - name: Upload Dependency-Check report
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: dependency-check-report
          if-no-files-found: warn
          path: target/dependency-check

  trivy-scan:
    runs-on: ubuntu-24.04
    needs: build-test-security
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - identity-service
          - user-group-service
          - project-config-service
          - sync-service
          - analysis-service
          - report-service
          - notification-service
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build Docker image (${{ matrix.service }})
        run: docker build -f ${{ matrix.service }}/Dockerfile -t samt/${{ matrix.service }}:ci .

      - name: Trivy scan (${{ matrix.service }})
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # 0.34.2
        with:
          image-ref: samt/${{ matrix.service }}:ci
          format: table
          exit-code: '1'
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: false

  codeql-sast:
    runs-on: ubuntu-24.04
    needs: build-test-security
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@2a2dd30f8030072d379eb0c9ea51789aa2ea9ca4 # v3.29.5
        with:
          languages: java
          queries: security-and-quality

      - name: Setup Java 21 (Temurin)
        uses: actions/setup-java@99b8673ff64fbf99d8d325f52d9a5bdedb8483e9 # v4.2.1
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build for CodeQL
        run: bash ./mvnw -B compile -DskipTests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@2a2dd30f8030072d379eb0c9ea51789aa2ea9ca4 # v3.29.5
        with:
          category: "/language:java"

      - name: Enforce CodeQL Quality Gate (HIGH/CRITICAL)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.parse
          import urllib.request

          token = os.environ["GITHUB_TOKEN"]
          api_url = os.environ.get("GITHUB_API_URL", "https://api.github.com")
          repo = os.environ["GITHUB_REPOSITORY"]
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          event_path = os.environ.get("GITHUB_EVENT_PATH", "")
          ref = os.environ.get("GITHUB_REF", "")

          params = {"state": "open", "per_page": "100"}
          if event_name == "pull_request" and event_path:
            with open(event_path, "r", encoding="utf-8") as f:
              event = json.load(f)
            pr_number = event.get("pull_request", {}).get("number")
            if pr_number:
              params["pr"] = str(pr_number)
          elif ref:
            params["ref"] = ref

          base = f"{api_url}/repos/{repo}/code-scanning/alerts"
          url = f"{base}?{urllib.parse.urlencode(params)}"

          high_or_critical = 0
          while url:
            req = urllib.request.Request(
              url,
              headers={
                "Authorization": f"Bearer {token}",
                "Accept": "application/vnd.github+json",
                "X-GitHub-Api-Version": "2022-11-28",
              },
            )
            with urllib.request.urlopen(req) as resp:
              payload = json.loads(resp.read().decode("utf-8"))
              for alert in payload:
                tool = (alert.get("tool") or {}).get("name", "")
                sev = ((alert.get("rule") or {}).get("security_severity_level") or "").lower()
                if tool.lower() == "codeql" and sev in {"high", "critical"}:
                  high_or_critical += 1

              link = resp.headers.get("Link", "")
              next_url = ""
              for part in link.split(","):
                part = part.strip()
                if 'rel="next"' in part and part.startswith("<"):
                  next_url = part.split(";")[0].strip("<>")
                  break
              url = next_url

          if high_or_critical > 0:
            print(f"::error::{high_or_critical} open HIGH/CRITICAL CodeQL alerts found")
            sys.exit(1)

          print("CodeQL quality gate passed: no open HIGH/CRITICAL alerts")
          PY
