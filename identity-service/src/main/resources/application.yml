# ==============================================
# IDENTITY SERVICE - APPLICATION CONFIG
# ==============================================
# Profile: default (local development)
# Profile: docker (containerized deployment)

server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful

spring:
  application:
    name: identity-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    # Password MUST be provided via SPRING_DATASOURCE_PASSWORD (no insecure fallback)
    # Docker: will typically be provided via SPRING_DATASOURCE_PASSWORD from environment
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/samt_identity?serverTimezone=UTC&ApplicationName=identity-service}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:?⚠️ REDIS_PASSWORD is required for security - set in .env file}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: ${SHOW_SQL:false}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
          batch_size: 20
        order_inserts: true
        order_updates: true

# Actuator for health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.example: ${LOG_LEVEL:DEBUG}
    org.hibernate.SQL: ${SQL_LOG_LEVEL:WARN}

# ==============================================
# gRPC CONFIGURATION
# ==============================================
grpc:
  server:
    port: ${GRPC_SERVER_PORT:9091}
    keep-alive-time: 30s
    keep-alive-timeout: 10s
    permit-keep-alive-without-calls: true
    max-inbound-message-size: 4MB
    security:
      enabled: true
      certificateChain: file:/certs/server.crt
      privateKey: file:/certs/server.key

# ==============================================
# JWT CONFIGURATION
# ==============================================
jwt:
  # RS256 asymmetric signing.
  # Identity Service loads the PRIVATE key; public key is derived or provided and exposed via JWKS.
  key:
    id: ${JWT_KEY_ID:identity-1}
    private-key-path: ${JWT_PRIVATE_KEY_PATH:}
    private-key-pem: ${JWT_PRIVATE_KEY_PEM:}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:}
    public-key-pem: ${JWT_PUBLIC_KEY_PEM:}
  # Access token expiration: 15 minutes (900000 ms)
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}
  # Refresh token expiration: 7 days (604800000 ms)
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha

---
# ==============================================
# DOCKER PROFILE
# ==============================================
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgres-identity:5432/samt_identity?serverTimezone=UTC&ApplicationName=identity-service
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  data:
    redis:
      host: redis
      port: 6379

server:
  port: 8081  # Keep consistent REST API port

grpc:
  server:
    port: 9091  # Keep consistent gRPC port

logging:
  level:
    root: INFO
    com.example: INFO