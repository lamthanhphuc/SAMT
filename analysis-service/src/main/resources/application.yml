# ==============================================
# ANALYSIS SERVICE - APPLICATION CONFIG
# ==============================================

server:
  port: ${SERVER_PORT:8083}
  shutdown: graceful

spring:
  application:
    name: analysis-service

  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/samt_analysis?serverTimezone=UTC&ApplicationName=analysis-service}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: ${SHOW_SQL:false}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${GATEWAY_INTERNAL_JWKS_URI:http://api-gateway:8080/.well-known/internal-jwks.json}

security:
  internal-jwt:
    issuer: ${GATEWAY_INTERNAL_JWT_ISSUER:samt-gateway}
    expected-service: ${GATEWAY_INTERNAL_JWT_EXPECTED_SERVICE:api-gateway}
    clock-skew-seconds: ${INTERNAL_JWT_CLOCK_SKEW_SECONDS:30}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.example: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: ${SQL_LOG_LEVEL:WARN}

openai:
  api:
    key: ${OPENAI_API_KEY}
    url: https://api.openai.com/v1/chat/completions
    model: gpt-4o-mini
    timeout: ${OPENAI_API_TIMEOUT_MS:5000}

resilience4j:
  retry:
    instances:
      openAi:
        max-attempts: 3
        wait-duration: 300ms
  circuitbreaker:
    instances:
      openAi:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50

---
# ==============================================
# DOCKER PROFILE
# ==============================================
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgres-analysis:5432/samt_analysis?serverTimezone=UTC&ApplicationName=analysis-service

  data:
    redis:
      host: redis

server:
  port: 8080

logging:
  level:
    root: INFO
    com.example: INFO
