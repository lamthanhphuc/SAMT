# Production profile: NO fallback secrets. Startup must fail if env vars are missing.

internal:
  signing:
    secret: ${INTERNAL_SIGNING_SECRET}
    key-id: ${INTERNAL_SIGNING_KEY_ID:gateway-1}

spring:
  datasource:
    password: ${SPRING_DATASOURCE_PASSWORD}

samt:
  secrets:
    datasource-password: ${SPRING_DATASOURCE_PASSWORD}
    internal-signing-secret: ${INTERNAL_SIGNING_SECRET}
