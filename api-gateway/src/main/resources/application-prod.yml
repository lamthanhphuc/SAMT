# Production profile: NO fallback secrets. Startup must fail if env vars are missing.

jwt:
  jwks-uri: ${JWT_JWKS_URI}

gateway:
  internal-jwt:
    private-key-pem-path: ${GATEWAY_INTERNAL_JWT_PRIVATE_KEY_PEM_PATH}
    key-id: ${GATEWAY_INTERNAL_JWT_KID}
    ttl-seconds: ${GATEWAY_INTERNAL_JWT_TTL_SECONDS:20}
    clock-skew-seconds: ${GATEWAY_INTERNAL_JWT_CLOCK_SKEW_SECONDS:30}
    issuer: ${GATEWAY_INTERNAL_JWT_ISSUER:samt-gateway}

samt:
  secrets:
    jwt-jwks-uri: ${JWT_JWKS_URI}
    gateway-internal-jwt-private-key-pem-path: ${GATEWAY_INTERNAL_JWT_PRIVATE_KEY_PEM_PATH}
    gateway-internal-jwt-kid: ${GATEWAY_INTERNAL_JWT_KID}

# Production hardening: expose only health; disable API docs.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
