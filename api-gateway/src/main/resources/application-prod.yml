# Production profile: NO fallback secrets. Startup must fail if env vars are missing.

jwt:
  jwks-uri: ${JWT_JWKS_URI}

gateway:
  internal-jwt:
    private-key-pem-path: ${GATEWAY_INTERNAL_JWT_PRIVATE_KEY_PEM_PATH}
    key-id: ${GATEWAY_INTERNAL_JWT_KID}
    ttl-seconds: ${GATEWAY_INTERNAL_JWT_TTL_SECONDS:20}
    clock-skew-seconds: ${GATEWAY_INTERNAL_JWT_CLOCK_SKEW_SECONDS:30}
    issuer: ${GATEWAY_INTERNAL_JWT_ISSUER:samt-gateway}

samt:
  secrets:
    jwt-jwks-uri: ${JWT_JWKS_URI}
    gateway-internal-jwt-private-key-pem-path: ${GATEWAY_INTERNAL_JWT_PRIVATE_KEY_PEM_PATH}
    gateway-internal-jwt-kid: ${GATEWAY_INTERNAL_JWT_KID}

# Production hardening: expose only health/info actuator while keeping gateway docs aggregation available.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    url: ""
    use-root-path: false
    disable-swagger-default-url: true
    urls-primary-name: Identity Service
    urls:
      - name: Identity Service
        url: /identity/v3/api-docs
      - name: User Group Service
        url: /user-group/v3/api-docs
      - name: Sync Service
        url: /sync/v3/api-docs
      - name: Project Config Service
        url: /project-config/v3/api-docs
      - name: Notification Service
        url: /notification/v3/api-docs
      - name: Analysis Service
        url: /analysis/v3/api-docs
      - name: Report Service
        url: /report/v3/api-docs
