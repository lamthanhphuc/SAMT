server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring:
  application:
    name: api-gateway

  lifecycle:
    timeout-per-shutdown-phase: 30s

  http:
    codecs:
      max-in-memory-size: 10MB

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis}
      timeout: 3000ms

  cloud:
    gateway:
      server:
        webflux:

          routes:

            - id: identity-service
              uri: http://identity-service:8081
              predicates:
                - Path=/identity/**
              filters:
                - StripPrefix=1

            - id: user-group-service
              uri: http://user-group-service:8082
              predicates:
                - Path=/user-group/**
              filters:
                - StripPrefix=1

            - id: sync-service
              uri: http://sync-service:8083
              predicates:
                - Path=/sync/**
              filters:
                - StripPrefix=1

            - id: project-config-service
              uri: http://project-config-service:8084
              predicates:
                - Path=/project-config/**
              filters:
                - StripPrefix=1

            - id: notification-service
              uri: http://notification-service:8085
              predicates:
                - Path=/notification/**
              filters:
                - StripPrefix=1

            - id: analysis-service
              uri: http://analysis-service:8087
              predicates:
                - Path=/analysis/**
              filters:
                - StripPrefix=1

            - id: report-service
              uri: http://report-service:8088
              predicates:
                - Path=/report/**
              filters:
                - StripPrefix=1

          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

          httpclient:
            connect-timeout: 2000
            response-timeout: 25s
            pool:
              max-connections: 2000
              max-idle-time: 20s
              max-life-time: 120s
              acquire-timeout: 45000

          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - PATCH
                  - OPTIONS
                allowedHeaders:
                  - "*"

jwt:
  jwks-uri: ${JWT_JWKS_URI:http://identity-service:8081/.well-known/jwks.json}

gateway:
  internal-jwt:
    private-key-pem-path: ${GATEWAY_INTERNAL_JWT_PRIVATE_KEY_PEM_PATH:../.local-certs/gateway-internal-jwt-private.pkcs8.pem}
    key-id: ${GATEWAY_INTERNAL_JWT_KID:gw-2026-01}
    ttl-seconds: ${GATEWAY_INTERNAL_JWT_TTL_SECONDS:20}
    clock-skew-seconds: ${GATEWAY_INTERNAL_JWT_CLOCK_SKEW_SECONDS:30}
    issuer: ${GATEWAY_INTERNAL_JWT_ISSUER:samt-gateway}
    service-name: api-gateway

rate:
  limit:
    global:
      requests-per-second: 400
      burst-capacity: 800
    login:
      requests-per-minute: 5
      burst-capacity: 10

resilience4j:
  circuitbreaker:
    configs:
      gatewayRoute:
        failure-rate-threshold: 90
        slow-call-rate-threshold: 100
        slow-call-duration-threshold: 20s
        sliding-window-type: COUNT_BASED
        sliding-window-size: 500
        minimum-number-of-calls: 200
        permitted-number-of-calls-in-half-open-state: 20
        wait-duration-in-open-state: 5s
    instances:
      gatewayDefaultCircuitBreaker:
        base-config: gatewayRoute
      identityServiceCircuitBreaker:
        base-config: gatewayRoute
      userGroupServiceCircuitBreaker:
        base-config: gatewayRoute
      projectConfigServiceCircuitBreaker:
        base-config: gatewayRoute
      syncServiceCircuitBreaker:
        base-config: gatewayRoute
      analysisServiceCircuitBreaker:
        base-config: gatewayRoute
      reportServiceCircuitBreaker:
        base-config: gatewayRoute
      notificationServiceCircuitBreaker:
        base-config: gatewayRoute
  timelimiter:
    configs:
      gatewayRoute:
        timeout-duration: 25s
    instances:
      gatewayDefaultCircuitBreaker:
        base-config: gatewayRoute
      identityServiceCircuitBreaker:
        base-config: gatewayRoute
      userGroupServiceCircuitBreaker:
        base-config: gatewayRoute
      projectConfigServiceCircuitBreaker:
        base-config: gatewayRoute
      syncServiceCircuitBreaker:
        base-config: gatewayRoute
      analysisServiceCircuitBreaker:
        base-config: gatewayRoute
      reportServiceCircuitBreaker:
        base-config: gatewayRoute
      notificationServiceCircuitBreaker:
        base-config: gatewayRoute

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs

  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    url: ""
    use-root-path: false
    disable-swagger-default-url: true
    urls-primary-name: Identity Service

    urls:
      - name: Identity Service
        url: /identity/v3/api-docs

      - name: User Group Service
        url: /user-group/v3/api-docs

      - name: Sync Service
        url: /sync/v3/api-docs

      - name: Project Config Service
        url: /project-config/v3/api-docs

      - name: Notification Service
        url: /notification/v3/api-docs

      - name: Analysis Service
        url: /analysis/v3/api-docs

      - name: Report Service
        url: /report/v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: INFO
    com.example.gateway: INFO

spring.webflux:
  problemdetails:
    enabled: false