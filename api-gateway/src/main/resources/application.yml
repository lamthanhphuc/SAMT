server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  error:
    whitelabel:
      enabled: false
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
    include-exception: false

spring:
  application:
    name: api-gateway

  lifecycle:
    timeout-per-shutdown-phase: 30s

  codec:
    max-in-memory-size: 10MB

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:?⚠️ REDIS_PASSWORD is required for security - set in .env file}
      timeout: 3000ms

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      httpclient:
        connect-timeout: 3000
        response-timeout: 30s
        pool:
          max-connections: 500
          max-idle-time: 20s
          acquire-timeout: 45000

jwt:
  secret: ${JWT_SECRET}

gateway:
  cors:
    allowed-origins:
      - https://app.example.com
    allowed-methods:
      - GET
      - POST
    allowed-headers:
      - Authorization
      - Content-Type
  internal:
    secret: ${INTERNAL_SIGNING_SECRET}

internal:
  signing:
    secret: ${INTERNAL_SIGNING_SECRET}
    key-id: gateway-1

rate:
  limit:
    global:
      requests-per-second: ${RATE_LIMIT_GLOBAL_RPS:100}
      burst-capacity: ${RATE_LIMIT_GLOBAL_BURST:200}
    login:
      requests-per-minute: ${RATE_LIMIT_LOGIN_RPM:5}
      burst-capacity: ${RATE_LIMIT_LOGIN_BURST:10}

resilience4j:
  circuitbreaker:
    instances:
      gatewayDefaultCircuitBreaker:
        failure-rate-threshold: 50
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 30s
        automatic-transition-from-open-to-half-open-enabled: true
  timelimiter:
    instances:
      gatewayDefaultCircuitBreaker:
        timeout-duration: 30s

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: Identity Service
        url: http://identity-service:8081/v3/api-docs
      - name: User-Group Service
        url: http://user-group-service:8082/v3/api-docs
      - name: Project Config Service
        url: http://project-config-service:8083/v3/api-docs
      - name: Sync Service
        url: http://sync-service:8084/v3/api-docs
  api-docs:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.example.gateway: ${GATEWAY_LOG_LEVEL:INFO}
    org.springframework.cloud.gateway: ${SPRING_GATEWAY_LOG_LEVEL:INFO}

# surface route-not-found as 404 for error handler
spring.webflux:
  problemdetails:
    enabled: false
