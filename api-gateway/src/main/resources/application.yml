server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  error:
    whitelabel:
      enabled: false
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
    include-exception: false

spring:
  application:
    name: api-gateway

  lifecycle:
    timeout-per-shutdown-phase: 30s

  codec:
    max-in-memory-size: 10MB

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      # In secure deployments, prefer Docker secret `redis_password` via Spring configtree.
      # Local/dev can still provide REDIS_PASSWORD via .env.
      password: ${redis_password:${REDIS_PASSWORD:?⚠️ REDIS_PASSWORD is required for security - set in .env file}}
      timeout: 3000ms

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      httpclient:
        connect-timeout: 3000
        response-timeout: 30s
        pool:
          max-connections: 500
          max-idle-time: 20s
          acquire-timeout: 45000
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - https://app.example.com
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - Accept

jwt:
  # Identity Service JWKS endpoint. Production should set JWT_JWKS_URI explicitly.
  jwks-uri: ${JWT_JWKS_URI:http://identity-service:8081/.well-known/jwks.json}

gateway:
  internal-jwt:
    # RSA private key used to sign internal JWTs (PKCS#8 PEM)
    private-key-pem-path: ${GATEWAY_INTERNAL_JWT_PRIVATE_KEY_PEM_PATH:/certs/gateway-private.pkcs8.pem}
    # kid for rotation support
    key-id: ${GATEWAY_INTERNAL_JWT_KID:gw-2026-01}
    # token lifetime 15-30s
    ttl-seconds: ${GATEWAY_INTERNAL_JWT_TTL_SECONDS:20}
    # downstream should use the same skew
    clock-skew-seconds: ${GATEWAY_INTERNAL_JWT_CLOCK_SKEW_SECONDS:30}
    issuer: ${GATEWAY_INTERNAL_JWT_ISSUER:samt-gateway}
    service-name: api-gateway
    # Optional: publish additional public keys for rotation overlap.
    # Format: JWKS JSON file containing "keys": [...] with public RSA keys.
    additional-public-jwks-json-path: ${GATEWAY_INTERNAL_JWT_ADDITIONAL_PUBLIC_JWKS_JSON_PATH:}

rate:
  limit:
    global:
      requests-per-second: ${RATE_LIMIT_GLOBAL_RPS:100}
      burst-capacity: ${RATE_LIMIT_GLOBAL_BURST:200}
    login:
      requests-per-minute: ${RATE_LIMIT_LOGIN_RPM:5}
      burst-capacity: ${RATE_LIMIT_LOGIN_BURST:10}

resilience4j:
  circuitbreaker:
    instances:
      gatewayDefaultCircuitBreaker:
        failure-rate-threshold: 50
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 30s
        automatic-transition-from-open-to-half-open-enabled: true
  timelimiter:
    instances:
      gatewayDefaultCircuitBreaker:
        timeout-duration: 30s

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: Identity Service
        url: /identity/v3/api-docs
      - name: User-Group Service
        url: /user-group/v3/api-docs
      - name: Project Config Service
        url: /project-config/v3/api-docs
      - name: Sync Service
        url: /sync/v3/api-docs
      - name: Analysis Service
        url: /analysis/v3/api-docs
      - name: Report Service
        url: /report/v3/api-docs
      - name: Notification Service
        url: /notification/v3/api-docs
  api-docs:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.example.gateway: ${GATEWAY_LOG_LEVEL:INFO}
    org.springframework.cloud.gateway: ${SPRING_GATEWAY_LOG_LEVEL:INFO}

# surface route-not-found as 404 for error handler
spring.webflux:
  problemdetails:
    enabled: false
