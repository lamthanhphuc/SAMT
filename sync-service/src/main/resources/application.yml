# ==============================================
# SYNC SERVICE - APPLICATION CONFIG
# ==============================================

server:
  port: ${SERVER_PORT:8084}
  shutdown: graceful
  forward-headers-strategy: framework

spring:
  application:
    name: sync-service

  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    # Password MUST be provided via SPRING_DATASOURCE_PASSWORD (no insecure fallback)
    # Docker: will typically be provided via SPRING_DATASOURCE_PASSWORD from environment
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5436/sync_db?serverTimezone=UTC&ApplicationName=sync-service}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: ${DB_POOL_SIZE:30}
      minimum-idle: ${DB_POOL_MIN_IDLE:10}
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 120000  # 2min - allows CREATE INDEX CONCURRENTLY in migrations

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      # In secure deployments, prefer Docker secret `redis_password` via Spring configtree.
      # Local/dev can still provide REDIS_PASSWORD via .env.
      password: ${redis_password:${REDIS_PASSWORD:?⚠️ REDIS_PASSWORD is required for security - set in .env file}}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 24
          max-idle: 16
          min-idle: 6

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: ${SHOW_SQL:false}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${GATEWAY_INTERNAL_JWKS_URI:http://api-gateway:8080/.well-known/internal-jwks.json}

# Gateway trust (downstream services do NOT validate external JWT)

security:
  internal-jwt:
    issuer: ${GATEWAY_INTERNAL_JWT_ISSUER:samt-gateway}
    expected-service: ${GATEWAY_INTERNAL_JWT_EXPECTED_SERVICE:api-gateway}
    clock-skew-seconds: ${INTERNAL_JWT_CLOCK_SKEW_SECONDS:30}

# ==============================================
#   ASYNC THREAD POOL CONFIGURATION
# ==============================================
sync:
  grpc:
    config-cache-ttl-seconds: ${SYNC_GRPC_CONFIG_CACHE_TTL_SECONDS:30}

  async:
    core-pool-size: ${SYNC_ASYNC_CORE_POOL:24}
    max-pool-size: ${SYNC_ASYNC_MAX_POOL:48}
    queue-capacity: ${SYNC_ASYNC_QUEUE_CAPACITY:300}
    thread-name-prefix: sync-

  scheduler:
    enabled: ${SYNC_SCHEDULER_ENABLED:true}
    jira-issues-cron: ${SYNC_JIRA_CRON:0 */30 * * * *}
    github-commits-cron: ${SYNC_GITHUB_CRON:0 */15 * * * *}

# ==============================================
#   GRPC CLIENT CONFIGURATION
# ==============================================
grpc:
  server:
    port: ${GRPC_SERVER_PORT:9094}
    security:
      enabled: ${GRPC_SERVER_SECURITY_ENABLED:true}
      certificateChain: file:/certs/server.crt
      privateKey: file:/certs/server.key
  client:
    default:
      negotiation-type: ${GRPC_CLIENT_DEFAULT_NEGOTIATION_TYPE:TLS}
      security:
        trustCertCollection: file:/certs/ca.crt
    project-config-service:
      address: dns:///project-config-service:9093
      max-inbound-message-size: 4194304
      enable-keep-alive: true
      keep-alive-time: 300s
      keep-alive-timeout: 60s

# ==============================================
#   RESILIENCE4J CONFIGURATION
# ==============================================
resilience4j:
  retry:
    instances:
      jiraRetry:
        max-attempts: 2
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        randomization-factor: 0.5
        exponential-max-wait-duration: 2s
        retry-exceptions:
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - org.springframework.web.reactive.function.client.WebClientRequestException
      githubRetry:
        max-attempts: 2
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        randomization-factor: 0.5
        exponential-max-wait-duration: 2s
        retry-exceptions:
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - org.springframework.web.reactive.function.client.WebClientRequestException
      grpcRetry:
        max-attempts: 2
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        randomization-factor: 0.5
        retry-exceptions:
          - com.example.syncservice.client.grpc.ProjectConfigGrpcClient$GrpcClientException
        ignore-exceptions:
          - com.example.syncservice.client.grpc.ProjectConfigGrpcClient$NonRetryableGrpcClientException
          - com.example.syncservice.exception.ConfigNotFoundException

  circuitbreaker:
    instances:
      jiraCircuitBreaker:
        sliding-window-size: 100
        minimum-number-of-calls: 20
        failure-rate-threshold: 75
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 10
        automatic-transition-from-open-to-half-open-enabled: true
        slow-call-duration-threshold: 10s
        slow-call-rate-threshold: 90
      githubCircuitBreaker:
        sliding-window-size: 100
        minimum-number-of-calls: 20
        failure-rate-threshold: 75
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 10
        automatic-transition-from-open-to-half-open-enabled: true
      grpcCircuitBreaker:
        sliding-window-size: 50
        minimum-number-of-calls: 20
        failure-rate-threshold: 60
        wait-duration-in-open-state: 8s
        permitted-number-of-calls-in-half-open-state: 10
        automatic-transition-from-open-to-half-open-enabled: true
        ignore-exceptions:
          - com.example.syncservice.exception.ConfigNotFoundException

  ratelimiter:
    instances:
      jiraRateLimiter:
        limit-for-period: 300
        limit-refresh-period: 1s
        timeout-duration: 200ms
      githubRateLimiter:
        limit-for-period: 5000
        limit-refresh-period: 60s
        timeout-duration: 200ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        sync.duration.seconds: true

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.example: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: ${SQL_LOG_LEVEL:WARN}
    net.javacrumbs.shedlock: INFO
    io.grpc: INFO

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    enabled: true
    persist-authorization: true

---
# ==============================================
# DOCKER PROFILE
# ==============================================
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgres-sync:5432/sync_db?serverTimezone=UTC&ApplicationName=sync-service

  data:
    redis:
      host: redis

server:
  port: 8080

grpc:
  server:
    security:
      enabled: true
  client:
    project-config-service:
      negotiation-type: TLS

logging:
  level:
    root: INFO
    com.example: INFO
