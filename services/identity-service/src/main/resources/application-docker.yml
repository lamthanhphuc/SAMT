spring:
  datasource:
    url: jdbc:postgresql://postgres-identity:5432/samt_identity?serverTimezone=UTC&ApplicationName=identity-service
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  data:
    redis:
      host: redis
      port: 6379

server:
  port: 8081

grpc:
  server:
    port: 9091
    security:
      enabled: false
  client:
    default:
      negotiation-type: plaintext

logging:
  level:
    root: INFO
    com.example: INFO
