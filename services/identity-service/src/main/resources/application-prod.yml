# Production profile: NO fallback secrets. Startup must fail if env vars are missing.

jwt:
  key:
    id: ${JWT_KEY_ID}
    private-key-path: ${JWT_PRIVATE_KEY_PATH:}
    private-key-pem: ${JWT_PRIVATE_KEY_PEM:}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:}
    public-key-pem: ${JWT_PUBLIC_KEY_PEM:}

spring:
  jpa:
    hibernate:
      ddl-auto: validate
  datasource:
    password: ${SPRING_DATASOURCE_PASSWORD}

samt:
  secrets:
    datasource-password: ${SPRING_DATASOURCE_PASSWORD}

# Production hardening: expose only health; disable API docs.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

grpc:
  server:
    security:
      enabled: true
      trustCertCollection: file:/certs/ca.crt
      clientAuth: REQUIRE

logging:
  level:
    root: INFO
    com.example: INFO
    org.hibernate.SQL: WARN
