spring:
  config:
    activate:
      on-profile: mtls

  ssl:
    bundle:
      pem:
        gateway-client:
          keystore:
            certificate: ${MTLS_CLIENT_CERT_PATH}
            private-key: ${MTLS_CLIENT_KEY_PATH}
          truststore:
            certificate: ${MTLS_CA_CERT_PATH}

gateway:
  mtls:
    enabled: true
    client-bundle: gateway-client

  # Switch upstream URIs to https when mTLS profile is enabled.
  upstream:
    identity: ${GATEWAY_UPSTREAM_IDENTITY_URI:https://identity-service:8081}
    user-group: ${GATEWAY_UPSTREAM_USER_GROUP_URI:https://user-group-service:8082}
    project-config: ${GATEWAY_UPSTREAM_PROJECT_CONFIG_URI:https://project-config-service:8084}
    sync: ${GATEWAY_UPSTREAM_SYNC_URI:https://sync-service:8083}
    analysis: ${GATEWAY_UPSTREAM_ANALYSIS_URI:https://analysis-service:8087}
    report: ${GATEWAY_UPSTREAM_REPORT_URI:https://report-service:8088}
    notification: ${GATEWAY_UPSTREAM_NOTIFICATION_URI:https://notification-service:8085}
