syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.example.syncservice.client.grpc";
option java_outer_classname = "SyncProto";

//package sync;

service SyncService {

  rpc GetIssuesByProjectConfig(ProjectConfigRequest)
      returns (IssueListResponse);

  rpc GetGithubCommitsByProjectConfig(ProjectConfigRequest)
      returns (GithubCommitListResponse);

  rpc GetUnifiedActivitiesByProjectConfig(ProjectConfigRequest)
      returns (UnifiedActivityListResponse);

}

message ProjectConfigRequest {
  string projectConfigId = 1;
}

message IssueResponse {
  string issueId = 1;
  string issueKey = 2;
  string summary = 3;
  string description = 4;
  string issueType = 5;
  string status = 6;
  string priority = 7;
  string assigneeEmail = 8;
  string assigneeName = 9;
  string reporterEmail = 10;
  string reporterName = 11;
  string createdAt = 12;
  string updatedAt = 13;
  string dueDate = 14;
}

message IssueListResponse {
  repeated IssueResponse issues = 1;
}

message GithubCommitResponse {
  string commitSha = 1;
  string message = 2;
  string committedDate = 3;
  string authorEmail = 4;
  string authorName = 5;
  int32 additions = 6;
  int32 deletions = 7;
  int32 totalChanges = 8;
}

message GithubCommitListResponse {
  repeated GithubCommitResponse commits = 1;
}

message UnifiedActivityResponse {
  string source = 1;
  string activityType = 2;
  string externalId = 3;
  string title = 4;
  string description = 5;
  string authorEmail = 6;
  string authorName = 7;
  string status = 8;
  string createdAt = 9;
  string updatedAt = 10;
}

message UnifiedActivityListResponse {
  repeated UnifiedActivityResponse activities = 1;
}