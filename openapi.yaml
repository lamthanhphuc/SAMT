openapi: 3.0.3
info:
  title: SAMT Unified Backend API
  version: 1.0.0
  description: Generated by scripts/generate-openapi.mjs from service OpenAPI docs exposed via API Gateway.
servers:
  - url: http://localhost:9080
tags:
