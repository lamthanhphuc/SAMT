    description: Operations proxied from identity service
  - name: userGroup
    description: Operations proxied from userGroup service
  - name: projectConfig
    description: Operations proxied from projectConfig service
paths:
  /api/admin/users/{userId}/external-accounts:
    put:
      tags:
        - Admin
      summary: Map/unmap external accounts
      description: Map or unmap Jira account ID and GitHub username. Send null to unmap.
      operationId: updateExternalAccounts
      parameters:
        - name: userId
          in: path
          description: User ID
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/identity_ExternalAccountsRequest'
        required: true
      responses:
        '200':
          description: External accounts updated
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/identity_ApiResponseExternalAccountsResponse'
        '400':
          description: User is deleted
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/identity_ApiResponseExternalAccountsResponse'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          description: User not found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/identity_ApiResponseExternalAccountsResponse'
        '409':
          description: External account already mapped to another user
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/identity_ApiResponseExternalAccountsResponse'
        '500':
          $ref: '#/components/responses/Error500'
      security:
        - bearerAuth: []
