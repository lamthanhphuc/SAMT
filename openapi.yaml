components:
  schemas:
    identity_UpdateProfileRequest:
      type: object
      properties:
        email:
          type: string
          maxLength: 255
          minLength: 0
        fullName:
          type: string
          maxLength: 100
          minLength: 2
          pattern: ^[\p{L}\s\-]{2,100}$
    identity_ApiResponse:
      type: object
      properties:
        timestamp:
          type: string
        status:
          type: integer
          format: int32
        success:
          type: boolean
        data:
          type: object
        error:
          type: string
        message:
          type: string
        path:
          type: string
        correlationId:
          type: string
        degraded:
          type: boolean
    identity_ProblemDetail:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
          format: uri
        properties:
          type: object
          additionalProperties:
            type: object
    identity_ExternalAccountsRequest:
      type: object
      properties:
        jiraAccountId:
          type: string
          pattern: ^[a-zA-Z0-9]{20,30}$
          nullable: true
          maxLength: 30
        githubUsername:
          type: string
          pattern: ^[a-zA-Z0-9-]{1,39}$
          nullable: true
          maxLength: 39
    identity_ApiResponseExternalAccountsResponse:
      type: object
      properties:
        timestamp:
          type: string
        status:
          type: integer
          format: int32
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/identity_ExternalAccountsResponse'
        error:
          type: string
        message:
          type: string
        path:
          type: string
        correlationId:
          type: string
        degraded:
          type: boolean
    identity_ExternalAccountsResponse:
      type: object
      properties:
        message:
          type: string
        user:
          $ref: '#/components/schemas/identity_UserDto'
    identity_UserDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        fullName:
          type: string
        role:
          type: string
        status:
          type: string
        jiraAccountId:
          type: string
          nullable: true
