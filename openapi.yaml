components:
  schemas:
    identity_ExternalAccountsRequest:
      type: object
      properties:
        jiraAccountId:
          type: string
          pattern: ^[a-zA-Z0-9]{20,30}$
        githubUsername:
          type: string
          pattern: ^[a-zA-Z0-9-]{1,39}$
    identity_ApiResponseExternalAccountsResponse:
      type: object
      properties:
        timestamp:
          type: string
        status:
          type: integer
          format: int32
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/identity_ExternalAccountsResponse'
        error:
          type: string
        message:
          type: string
        path:
          type: string
        correlationId:
          type: string
        degraded:
          type: boolean
    identity_ExternalAccountsResponse:
      type: object
      properties:
        message:
          type: string
        user:
          $ref: '#/components/schemas/identity_UserDto'
    identity_UserDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        fullName:
          type: string
        role:
          type: string
        status:
          type: string
        jiraAccountId:
          type: string
          nullable: true
        githubUsername:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    identity_RegisterRequest:
      type: object
      properties:
        email:
          type: string
          maxLength: 255
          minLength: 0
          format: email
        password:
          type: string
          minLength: 8
          pattern: ^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,128}$
          maxLength: 128
        confirmPassword:
          type: string
          minLength: 1
        fullName:
          type: string
          maxLength: 100
          minLength: 2
          pattern: ^[\p{L}\s\-]{2,100}$
        role:
          type: string
          minLength: 1
          pattern: ^STUDENT$
          enum:
            - STUDENT
      required:
        - email
        - password
        - confirmPassword
        - fullName
        - role
    identity_ApiResponse:
      type: object
      properties:
        timestamp:
          type: string
        status:
          type: integer
          format: int32
        success:
          type: boolean
        data:
          type: object
        error:
          type: string
        message:
          type: string
        path:
          type: string
        correlationId:
          type: string
        degraded:
          type: boolean
    identity_RefreshTokenRequest:
      type: object
      properties:
        refreshToken:
          type: string
          minLength: 1
    identity_LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
          minLength: 1
    identity_LoginRequest:
      type: object
      properties:
        email:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
    identity_AdminCreateUserRequest:
      type: object
      properties:
        email:
          type: string
          maxLength: 255
          minLength: 0
        password:
          type: string
          minLength: 1
          pattern: ^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,128}$
        fullName:
          type: string
          maxLength: 100
          minLength: 2
          pattern: ^[\p{L}\s\-]{2,100}$
        role:
          type: string
          minLength: 1
          pattern: ^(STUDENT|LECTURER|ADMIN)$
    identity_AdminCreateUserResponse:
      type: object
      properties:
        message:
          type: string
        user:
          $ref: '#/components/schemas/identity_UserDto'
        temporaryPassword:
          type: string
    identity_ApiResponseAdminCreateUserResponse:
      type: object
      properties:
        timestamp:
          type: string
        status:
          type: integer
          format: int32
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/identity_AdminCreateUserResponse'
        error:
          type: string
        message:
          type: string
        path:
          type: string
        correlationId:
          type: string
        degraded:
          type: boolean
    identity_AdminActionResponse:
      type: object
      properties:
        message:
          type: string
        userId:
          type: string
    identity_ApiResponseAdminActionResponse:
      type: object
      properties:
        timestamp:
          type: string
        status:
          type: integer
          format: int32
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/identity_AdminActionResponse'
        error:
          type: string
        message:
          type: string
        path:
          type: string
        correlationId:
          type: string
        degraded:
          type: boolean
    identity_Pageable:
      type: object
      properties:
        page:
          type: integer
          format: int32
          minimum: 0
        size:
          type: integer
          format: int32
          minimum: 1
        sort:
          type: array
          items:
            type: string
    identity_ApiResponsePageAuditLog:
      type: object
      properties:
        timestamp:
          type: string
        status:
          type: integer
          format: int32
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/identity_PageAuditLog'
        error:
          type: string
        message:
          type: string
        path:
          type: string
        correlationId:
          type: string
        degraded:
          type: boolean
    identity_AuditLog:
      type: object
      properties:
        id:
          type: integer
          format: int64
        entityType:
          type: string
        entityId:
          type: integer
          format: int64
        action:
          type: string
          enum:
            - CREATE
            - UPDATE
            - SOFT_DELETE
            - RESTORE
            - LOGIN_SUCCESS
            - LOGIN_FAILED
            - LOGIN_DENIED
            - LOGOUT
            - REFRESH_SUCCESS
            - REFRESH_REUSE
            - REFRESH_EXPIRED
            - ACCOUNT_LOCKED
            - ACCOUNT_UNLOCKED
            - PASSWORD_CHANGE
        actorId:
          type: integer
          format: int64
          nullable: true
        actorEmail:
          type: string
          nullable: true
        timestamp:
          type: string
        ipAddress:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        oldValue:
          $ref: '#/components/schemas/identity_JsonNode'
          nullable: true
        newValue:
          $ref: '#/components/schemas/identity_JsonNode'
          nullable: true
        outcome:
          type: string
          enum:
            - SUCCESS
            - FAILURE
