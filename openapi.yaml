openapi: 3.0.3
info:
  title: SAMT Unified Backend API
  version: 1.0.0
  description: Generated by scripts/generate-openapi.mjs from service OpenAPI docs exposed via API Gateway.
servers:
  - url: http://localhost:9080
tags:
  - name: identity
    description: Operations proxied from identity service
  - name: userGroup
    description: Operations proxied from userGroup service
  - name: projectConfig
    description: Operations proxied from projectConfig service
  - name: sync
    description: Operations proxied from sync service
  - name: report
    description: Operations proxied from report service
paths:
