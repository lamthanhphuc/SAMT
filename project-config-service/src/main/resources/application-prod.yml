# Production profile: NO fallback secrets. Startup must fail if env vars are missing.

spring:
  jpa:
    hibernate:
      ddl-auto: validate
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${GATEWAY_INTERNAL_JWKS_URI}

  datasource:
    password: ${SPRING_DATASOURCE_PASSWORD}

security:
  internal-jwt:
    issuer: ${GATEWAY_INTERNAL_JWT_ISSUER}
    expected-service: ${GATEWAY_INTERNAL_JWT_EXPECTED_SERVICE:api-gateway}
    clock-skew-seconds: ${INTERNAL_JWT_CLOCK_SKEW_SECONDS:30}

encryption:
  secret-key: ${ENCRYPTION_SECRET_KEY}

samt:
  secrets:
    datasource-password: ${SPRING_DATASOURCE_PASSWORD}
    encryption-secret-key: ${ENCRYPTION_SECRET_KEY}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# ============================================
#   ACTUATOR (HARDENED FOR PRODUCTION)
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
    metrics:
      enabled: false
    prometheus:
      enabled: false
  prometheus:
    metrics:
      export:
        enabled: false
  metrics:
    export:
      prometheus:
        enabled: false
  server:
    add-application-context-header: false

grpc:
  server:
    security:
      enabled: true
      clientAuth: REQUIRE
      certificateChain: file:/certs/server.crt
      privateKey: file:/certs/server.key
      trustCertCollection: file:/certs/ca.crt
  client:
    default:
      negotiation-type: TLS
      security:
        certificateChain: file:/certs/client.crt
        privateKey: file:/certs/client.key
        trustCertCollection: file:/certs/ca.crt
    user-group-service:
      address: dns:///user-group-service:9095

logging:
  level:
    root: INFO
    com.samt.projectconfig: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
