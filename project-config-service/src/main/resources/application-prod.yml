# Production profile: NO fallback secrets. Startup must fail if env vars are missing.

spring:
  jpa:
    hibernate:
      ddl-auto: validate
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${GATEWAY_INTERNAL_JWKS_URI}

  datasource:
    password: ${SPRING_DATASOURCE_PASSWORD}

security:
  internal-jwt:
    issuer: ${GATEWAY_INTERNAL_JWT_ISSUER}
    expected-service: ${GATEWAY_INTERNAL_JWT_EXPECTED_SERVICE:api-gateway}
    clock-skew-seconds: ${INTERNAL_JWT_CLOCK_SKEW_SECONDS:30}

encryption:
  secret-key: ${ENCRYPTION_SECRET_KEY}

samt:
  secrets:
    datasource-password: ${SPRING_DATASOURCE_PASSWORD}
    encryption-secret-key: ${ENCRYPTION_SECRET_KEY}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# ============================================
#   ACTUATOR (HARDENED FOR PRODUCTION)
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
  server:
    port: 9001
    add-application-context-header: false

grpc:
  server:
    security:
      enabled: true
      clientAuth: REQUIRE
      certificateChain: classpath:certs/server.crt
      privateKey: classpath:certs/server.key
      trustCertCollection: classpath:certs/ca.crt
  client:
    default:
      negotiation-type: TLS
      security:
        certificateChain: classpath:certs/client.crt
        privateKey: classpath:certs/client.key
        trustCertCollection: classpath:certs/ca.crt
    user-group-service:
      address: dns:///user-group-service:9095
