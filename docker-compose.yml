version: "3.9"

# ==============================================
# SAMT MICROSERVICES - DOCKER COMPOSE
# ==============================================
# ⚠️ BẮT BUỘC: Tạo file .env từ .env.example trước khi chạy!
# ⚠️ KHÔNG DÙNG default credentials trong Production!
#
# Sử dụng:
#   1. cp .env.example .env
#   2. Sửa POSTGRES_PASSWORD trong .env
#   3. docker-compose up -d

services:

  # ========================================
  #   INFRASTRUCTURE SERVICES
  # ========================================

  postgres-identity:
    image: postgres:15-alpine@sha256:fceb6f86328c36f2438fae3b851b0cc57c4a7e69a58c866d9ce24281f2cf0c9c
    container_name: postgres-identity
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_IDENTITY_NAME:-samt_identity}
      POSTGRES_USER: ${POSTGRES_USER:?⚠️ POSTGRES_USER is required - create .env file}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?⚠️ POSTGRES_PASSWORD is required - create .env file}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - identity_data:/var/lib/postgresql/data
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres-core:
    image: postgres:15-alpine@sha256:fceb6f86328c36f2438fae3b851b0cc57c4a7e69a58c866d9ce24281f2cf0c9c
    container_name: postgres-core
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_CORE_NAME:-samt_core}
      POSTGRES_USER: ${POSTGRES_USER:?⚠️ POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?⚠️ POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - core_data:/var/lib/postgresql/data
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres-projectconfig:
    image: postgres:15-alpine@sha256:fceb6f86328c36f2438fae3b851b0cc57c4a7e69a58c866d9ce24281f2cf0c9c
    container_name: postgres-projectconfig
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_PROJECTCONFIG_NAME:-projectconfig_db}
      POSTGRES_USER: ${POSTGRES_USER:?⚠️ POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?⚠️ POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - projectconfig_data:/var/lib/postgresql/data
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres-usergroup:
    image: postgres:15-alpine@sha256:fceb6f86328c36f2438fae3b851b0cc57c4a7e69a58c866d9ce24281f2cf0c9c
    container_name: postgres-usergroup
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_USERGROUP_NAME:-samt_usergroup}
      POSTGRES_USER: ${POSTGRES_USER:?⚠️ POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?⚠️ POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - usergroup_data:/var/lib/postgresql/data
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres-sync:
    image: postgres:15-alpine@sha256:fceb6f86328c36f2438fae3b851b0cc57c4a7e69a58c866d9ce24281f2cf0c9c
    container_name: postgres-sync
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_SYNC_NAME:-sync_db}
      POSTGRES_USER: ${POSTGRES_USER:?⚠️ POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?⚠️ POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - sync_data:/var/lib/postgresql/data
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0@sha256:24cdd3a7fa89d2bed150560ebea81ff1943badfa61e51d66bb541a6b0d7fb047
    container_name: kafka
    # SECURITY: do not publish Kafka ports to the host by default.
    # If you need host access for local tooling, use docker-compose.override.yml (see example).
    environment:
      ENV: ${ENV:-local}
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    command:
      - bash
      - -ec
      - |
        if [[ "${ENV:-}" == "production" ]]; then
          if echo "${KAFKA_LISTENERS:-}" | grep -qi 'PLAINTEXT://' || echo "${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:-}" | grep -qi 'PLAINTEXT'; then
            echo "FATAL: ENV=production but Kafka is configured with PLAINTEXT listeners. Use docker-compose.kafka-production.yml instead."
            exit 1
          fi
        fi
        exec /etc/confluent/docker/run
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065
    container_name: redis
    env_file: .env
    # SECURITY: avoid passing secrets in process arguments. The password comes from env at runtime
    # and is written into a restrictive config file before starting redis-server.
    command:
      - sh
      - -ec
      - |
        umask 077
        : "${REDIS_PASSWORD:?⚠️ REDIS_PASSWORD is required - create .env file}"
        printf 'requirepass %s\n' "$${REDIS_PASSWORD}" > /tmp/redis.conf
        exec redis-server /tmp/redis.conf \
          --appendonly yes \
          --maxmemory 256mb \
          --maxmemory-policy allkeys-lru \
          --protected-mode yes \
          --bind 0.0.0.0
    # ❌ REMOVED: Port mapping for security (no external access)
    # ports:
    #   - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$${REDIS_PASSWORD}\" redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ========================================
  #   APPLICATION SERVICES
  # ========================================

  api-gateway:
    image: samt/api-gateway:1.0.0
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: 8080
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?⚠️ REDIS_PASSWORD is required - create .env file}
      JAVA_TOOL_OPTIONS: ${JAVA_OPTS:--Xms256m -Xmx512m}
      # Internal JWT signing key (required - mounted from host)
      GATEWAY_INTERNAL_JWT_PRIVATE_KEY_PEM_PATH: /certs/gateway-internal-jwt-private.pkcs8.pem
      GATEWAY_INTERNAL_JWT_KID: ${GATEWAY_INTERNAL_JWT_KID:-gw-local-1}
      # Upstream routing (aligns with the ports configured below)
      gateway.upstream.identity: http://identity-service:${IDENTITY_SERVICE_PORT:-8081}
      gateway.upstream.user-group: http://user-group-service:${USER_GROUP_SERVICE_PORT:-8082}
      gateway.upstream.sync: http://sync-service:${SYNC_SERVICE_PORT:-8083}
      gateway.upstream.project-config: http://project-config-service:${PROJECT_CONFIG_SERVICE_PORT:-8084}
      gateway.upstream.analysis: http://analysis-service:${ANALYSIS_SERVICE_PORT:-8087}
      gateway.upstream.report: http://report-service:${REPORT_SERVICE_PORT:-8088}
      gateway.upstream.notification: http://notification-service:${NOTIFICATION_SERVICE_PORT:-8085}
      # External JWT validation (gateway validates user JWT via identity service JWKS)
      JWT_JWKS_URI: http://identity-service:${IDENTITY_SERVICE_PORT:-8081}/.well-known/jwks.json
      SPRINGDOC_API_DOCS_ENABLED: "true"
      SPRINGDOC_API_DOCS_PATH: /v3/api-docs
      SPRINGDOC_SWAGGER_UI_ENABLED: "true"
      SPRINGDOC_SWAGGER_UI_PATH: /swagger-ui.html
      SPRINGDOC_SWAGGER_UI_CONFIG_URL: /v3/api-docs/swagger-config
      SPRINGDOC_SWAGGER_UI_URL: ""
      SPRINGDOC_SWAGGER_UI_DISABLE_SWAGGER_DEFAULT_URL: "true"
      SPRINGDOC_SWAGGER_UI_USE_ROOT_PATH: "false"
    ports:
      - "${API_GATEWAY_PORT:-9080}:8080"
    volumes:
      - ./.local-certs:/certs:ro
    depends_on:
      redis:
        condition: service_healthy
      identity-service:
        condition: service_started
      user-group-service:
        condition: service_started
      project-config-service:
        condition: service_started
      sync-service:
        condition: service_started
      analysis-service:
        condition: service_started
      report-service:
        condition: service_started
      notification-service:
        condition: service_started
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:$${SERVER_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  identity-service:
    image: samt/identity-service:1.0.0
    build:
      context: .
      dockerfile: identity-service/Dockerfile
    container_name: identity-service
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: ${IDENTITY_SERVICE_PORT:-8081}
      GRPC_SERVER_PORT: ${IDENTITY_SERVICE_GRPC_PORT:-9091}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-identity:5432/${DB_IDENTITY_NAME:-samt_identity}?serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?⚠️ REDIS_PASSWORD is required - create .env file}
      JAVA_TOOL_OPTIONS: ${JAVA_OPTS:--Xms256m -Xmx512m}
      # Identity JWT signing key (required - mounted from host)
      JWT_PRIVATE_KEY_PATH: /certs/identity-jwt-private.pkcs8.pem
      JWT_KEY_ID: ${JWT_KEY_ID:-identity-local-1}
      # Local/dev: allow running without gRPC TLS material
      GRPC_SERVER_SECURITY_ENABLED: ${GRPC_SERVER_SECURITY_ENABLED:-true}
    ports:
      - "${IDENTITY_SERVICE_PORT:-8081}:${IDENTITY_SERVICE_PORT:-8081}"
    expose:
      - "${IDENTITY_SERVICE_PORT:-8081}"
      - "${IDENTITY_SERVICE_GRPC_PORT:-9091}"
    volumes:
      - ./.local-certs:/certs:ro
    depends_on:
      postgres-identity:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:$${SERVER_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  user-group-service:
    image: samt/user-group-service:1.0.0
    build:
      context: .
      dockerfile: user-group-service/Dockerfile
    container_name: user-group-service
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: ${USER_GROUP_SERVICE_PORT:-8082}
      GRPC_SERVER_PORT: ${USER_GROUP_SERVICE_GRPC_PORT:-9095}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-usergroup:5432/${DB_USERGROUP_NAME:-samt_usergroup}?serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_ENABLED: ${KAFKA_ENABLED:-true}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?⚠️ REDIS_PASSWORD is required - create .env file}
      JAVA_TOOL_OPTIONS: ${JAVA_OPTS:--Xms256m -Xmx512m}
      # SECURITY DEFAULTS: TLS/mTLS by default. Override explicitly for local dev if needed.
      GRPC_SERVER_SECURITY_ENABLED: ${GRPC_SERVER_SECURITY_ENABLED:-true}
      GRPC_CLIENT_DEFAULT_NEGOTIATION_TYPE: ${GRPC_CLIENT_DEFAULT_NEGOTIATION_TYPE:-TLS}
    ports:
      - "${USER_GROUP_SERVICE_PORT:-8082}:${USER_GROUP_SERVICE_PORT:-8082}"
    expose:
      - "${USER_GROUP_SERVICE_PORT:-8082}"
      - "${USER_GROUP_SERVICE_GRPC_PORT:-9095}"
    depends_on:
      postgres-usergroup:
        condition: service_healthy
      redis:
        condition: service_healthy
      identity-service:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:$${SERVER_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  project-config-service:
    image: samt/project-config-service:1.0.0
    build:
      context: .
      dockerfile: project-config-service/Dockerfile
    container_name: project-config-service
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: ${PROJECT_CONFIG_SERVICE_PORT:-8084}
      GRPC_SERVER_PORT: ${PROJECT_CONFIG_SERVICE_GRPC_PORT:-9093}
      DATABASE_URL: jdbc:postgresql://postgres-projectconfig:5432/${DB_PROJECTCONFIG_NAME:-projectconfig_db}
      DATABASE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JAVA_TOOL_OPTIONS: ${JAVA_OPTS:--Xms256m -Xmx512m}
      # SECURITY DEFAULTS: TLS/mTLS by default. Override explicitly for local dev if needed.
      GRPC_SERVER_SECURITY_ENABLED: ${GRPC_SERVER_SECURITY_ENABLED:-true}
      GRPC_CLIENT_DEFAULT_NEGOTIATION_TYPE: ${GRPC_CLIENT_DEFAULT_NEGOTIATION_TYPE:-TLS}
    ports:
      - "${PROJECT_CONFIG_SERVICE_PORT:-8084}:${PROJECT_CONFIG_SERVICE_PORT:-8084}"
    expose:
      - "${PROJECT_CONFIG_SERVICE_PORT:-8084}"
    depends_on:
      postgres-projectconfig:
        condition: service_healthy
      user-group-service:
        condition: service_started
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:$${SERVER_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  sync-service:
    image: samt/sync-service:1.0.0
    build:
      context: .
      dockerfile: sync-service/Dockerfile
    container_name: sync-service
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: ${SYNC_SERVICE_PORT:-8083}
      GRPC_SERVER_PORT: ${SYNC_SERVICE_GRPC_PORT:-9094}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-sync:5432/${DB_SYNC_NAME:-sync_db}?serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?⚠️ REDIS_PASSWORD is required - create .env file}
      JAVA_TOOL_OPTIONS: ${JAVA_OPTS:--Xms256m -Xmx512m}
      # SECURITY DEFAULTS: TLS/mTLS by default. Override explicitly for local dev if needed.
      GRPC_SERVER_SECURITY_ENABLED: ${GRPC_SERVER_SECURITY_ENABLED:-true}
      GRPC_CLIENT_DEFAULT_NEGOTIATION_TYPE: ${GRPC_CLIENT_DEFAULT_NEGOTIATION_TYPE:-TLS}
    ports:
      - "${SYNC_SERVICE_PORT:-8083}:${SYNC_SERVICE_PORT:-8083}"
    expose:
      - "${SYNC_SERVICE_PORT:-8083}"
    depends_on:
      postgres-sync:
        condition: service_healthy
      redis:
        condition: service_healthy
      project-config-service:
        condition: service_started
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:$${SERVER_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  analysis-service:
    image: samt/analysis-service:1.0.0
    build:
      context: .
      dockerfile: analysis-service/Dockerfile
    container_name: analysis-service
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: ${ANALYSIS_SERVICE_PORT:-8087}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-core:5432/${DB_CORE_NAME:-samt_core}?serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?⚠️ REDIS_PASSWORD is required - create .env file}
      JAVA_TOOL_OPTIONS: ${JAVA_OPTS:--Xms256m -Xmx512m}
    ports:
      - "${ANALYSIS_SERVICE_PORT:-8087}:${ANALYSIS_SERVICE_PORT:-8087}"
    expose:
      - "${ANALYSIS_SERVICE_PORT:-8087}"
    depends_on:
      postgres-core:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:$${SERVER_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  report-service:
    image: samt/report-service:1.0.0
    build:
      context: .
      dockerfile: report-service/Dockerfile
    container_name: report-service
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: ${REPORT_SERVICE_PORT:-8088}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-core:5432/${DB_CORE_NAME:-samt_core}?serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?⚠️ REDIS_PASSWORD is required - create .env file}
      JAVA_TOOL_OPTIONS: ${JAVA_OPTS:--Xms256m -Xmx512m}
    ports:
      - "${REPORT_SERVICE_PORT:-8088}:${REPORT_SERVICE_PORT:-8088}"
    expose:
      - "${REPORT_SERVICE_PORT:-8088}"
    depends_on:
      postgres-core:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:$${SERVER_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  notification-service:
    image: samt/notification-service:1.0.0
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: ${NOTIFICATION_SERVICE_PORT:-8085}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-core:5432/${DB_CORE_NAME:-samt_core}?serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?⚠️ REDIS_PASSWORD is required - create .env file}
      JAVA_TOOL_OPTIONS: ${JAVA_OPTS:--Xms256m -Xmx512m}
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8085}:${NOTIFICATION_SERVICE_PORT:-8085}"
    expose:
      - "${NOTIFICATION_SERVICE_PORT:-8085}"
    depends_on:
      postgres-core:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:$${SERVER_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

# ========================================
#   NETWORKS & VOLUMES
# ========================================

networks:
  samt-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  identity_data:
    driver: local
  core_data:
    driver: local
  projectconfig_data:
    driver: local
  usergroup_data:
    driver: local
  sync_data:
    driver: local
  redis_data:
    driver: local
  kafka_data:
    driver: local
