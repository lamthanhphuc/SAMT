version: "3.9"

# ==============================================
# SAMT MICROSERVICES - DOCKER COMPOSE
# ==============================================
# ⚠️ BẮT BUỘC: Tạo file .env từ .env.example trước khi chạy!
# ⚠️ KHÔNG DÙNG default credentials trong Production!
#
# Sử dụng:
#   1. cp .env.example .env
#   2. Sửa POSTGRES_PASSWORD trong .env
#   3. docker-compose up -d

services:

  # ========================================
  #   INFRASTRUCTURE SERVICES
  # ========================================

  postgres-identity:
    image: postgres:15-alpine
    container_name: postgres-identity
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_IDENTITY_NAME:-samt_identity}
      POSTGRES_USER: ${POSTGRES_USER:?⚠️ POSTGRES_USER is required - create .env file}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?⚠️ POSTGRES_PASSWORD is required - create .env file}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${POSTGRES_IDENTITY_PORT:-5432}:5432"
    volumes:
      - identity_data:/var/lib/postgresql/data
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres-core:
    image: postgres:15-alpine
    container_name: postgres-core
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_CORE_NAME:-samt_core}
      POSTGRES_USER: ${POSTGRES_USER:?⚠️ POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?⚠️ POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${POSTGRES_CORE_PORT:-5433}:5432"
    volumes:
      - core_data:/var/lib/postgresql/data
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres-projectconfig:
    image: postgres:15-alpine
    container_name: postgres-projectconfig
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_PROJECTCONFIG_NAME:-projectconfig_db}
      POSTGRES_USER: ${POSTGRES_USER:?⚠️ POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?⚠️ POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${POSTGRES_PROJECTCONFIG_PORT:-5434}:5432"
    volumes:
      - projectconfig_data:/var/lib/postgresql/data
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres-usergroup:
    image: postgres:15-alpine
    container_name: postgres-usergroup
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_USERGROUP_NAME:-samt_usergroup}
      POSTGRES_USER: ${POSTGRES_USER:?⚠️ POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?⚠️ POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${POSTGRES_USERGROUP_PORT:-5435}:5432"
    volumes:
      - usergroup_data:/var/lib/postgresql/data
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres-sync:
    image: postgres:15-alpine
    container_name: postgres-sync
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_SYNC_NAME:-sync_db}
      POSTGRES_USER: ${POSTGRES_USER:?⚠️ POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?⚠️ POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${POSTGRES_SYNC_PORT:-5436}:5432"
    volumes:
      - sync_data:/var/lib/postgresql/data
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    env_file: .env
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:?⚠️ REDIS_PASSWORD is required - create .env file} --protected-mode yes --bind 0.0.0.0
    # ❌ REMOVED: Port mapping for security (no external access)
    # ports:
    #   - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ========================================
  #   APPLICATION SERVICES
  # ========================================

  api-gateway:
    image: samt/api-gateway:latest
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: 8080
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?⚠️ REDIS_PASSWORD is required - create .env file}
      JAVA_TOOL_OPTIONS: ${JAVA_OPTS:--Xms256m -Xmx512m}
      # Internal JWT signing key (required - mounted from host)
      GATEWAY_INTERNAL_JWT_PRIVATE_KEY_PEM_PATH: /certs/gateway-internal-jwt-private.pkcs8.pem
      GATEWAY_INTERNAL_JWT_KID: ${GATEWAY_INTERNAL_JWT_KID:-gw-local-1}
      # Upstream routing (aligns with the ports configured below)
      gateway.upstream.identity: http://identity-service:${IDENTITY_SERVICE_PORT:-8081}
      gateway.upstream.user-group: http://user-group-service:${USER_GROUP_SERVICE_PORT:-8082}
      gateway.upstream.sync: http://sync-service:${SYNC_SERVICE_PORT:-8083}
      gateway.upstream.project-config: http://project-config-service:${PROJECT_CONFIG_SERVICE_PORT:-8084}
      gateway.upstream.analysis: http://analysis-service:${ANALYSIS_SERVICE_PORT:-8087}
      gateway.upstream.report: http://report-service:${REPORT_SERVICE_PORT:-8088}
      # External JWT validation (gateway validates user JWT via identity service JWKS)
      JWT_JWKS_URI: http://identity-service:${IDENTITY_SERVICE_PORT:-8081}/.well-known/jwks.json
    ports:
      - "${API_GATEWAY_PORT:-9080}:8080"
    volumes:
      - ./.local-certs:/certs:ro
    depends_on:
      redis:
        condition: service_healthy
      identity-service:
        condition: service_started
      user-group-service:
        condition: service_started
      project-config-service:
        condition: service_started
      sync-service:
        condition: service_started
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:$${SERVER_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  identity-service:
    image: samt/identity-service:latest
    build:
      context: .
      dockerfile: identity-service/Dockerfile
    container_name: identity-service
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: ${IDENTITY_SERVICE_PORT:-8081}
      GRPC_SERVER_PORT: ${IDENTITY_SERVICE_GRPC_PORT:-9091}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-identity:5432/${DB_IDENTITY_NAME:-samt_identity}?serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?⚠️ REDIS_PASSWORD is required - create .env file}
      JAVA_TOOL_OPTIONS: ${JAVA_OPTS:--Xms256m -Xmx512m}
      # Identity JWT signing key (required - mounted from host)
      JWT_PRIVATE_KEY_PATH: /certs/identity-jwt-private.pkcs8.pem
      JWT_KEY_ID: ${JWT_KEY_ID:-identity-local-1}
      # Local/dev: allow running without gRPC TLS material
      GRPC_SERVER_SECURITY_ENABLED: ${GRPC_SERVER_SECURITY_ENABLED:-false}
    ports:
      - "${IDENTITY_SERVICE_PORT:-8081}:${IDENTITY_SERVICE_PORT:-8081}"
      - "${IDENTITY_SERVICE_GRPC_PORT:-9091}:${IDENTITY_SERVICE_GRPC_PORT:-9091}"
    volumes:
      - ./.local-certs:/certs:ro
    depends_on:
      postgres-identity:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:$${SERVER_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  user-group-service:
    image: samt/user-group-service:latest
    build:
      context: .
      dockerfile: user-group-service/Dockerfile
    container_name: user-group-service
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: ${USER_GROUP_SERVICE_PORT:-8082}
      GRPC_SERVER_PORT: ${USER_GROUP_SERVICE_GRPC_PORT:-9095}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-usergroup:5432/${DB_USERGROUP_NAME:-samt_usergroup}?serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_ENABLED: ${KAFKA_ENABLED:-true}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JAVA_TOOL_OPTIONS: ${JAVA_OPTS:--Xms256m -Xmx512m}
      # Local/dev: allow running without gRPC TLS material
      GRPC_SERVER_SECURITY_ENABLED: ${GRPC_SERVER_SECURITY_ENABLED:-false}
      GRPC_CLIENT_DEFAULT_NEGOTIATION_TYPE: ${GRPC_CLIENT_DEFAULT_NEGOTIATION_TYPE:-plaintext}
    ports:
      - "${USER_GROUP_SERVICE_PORT:-8082}:${USER_GROUP_SERVICE_PORT:-8082}"
      - "${USER_GROUP_SERVICE_GRPC_PORT:-9095}:${USER_GROUP_SERVICE_GRPC_PORT:-9095}"
    depends_on:
      postgres-usergroup:
        condition: service_healthy
      identity-service:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:$${SERVER_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  project-config-service:
    image: samt/project-config-service:latest
    build:
      context: .
      dockerfile: project-config-service/Dockerfile
    container_name: project-config-service
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: ${PROJECT_CONFIG_SERVICE_PORT:-8084}
      GRPC_SERVER_PORT: ${PROJECT_CONFIG_SERVICE_GRPC_PORT:-9093}
      DATABASE_URL: jdbc:postgresql://postgres-projectconfig:5432/${DB_PROJECTCONFIG_NAME:-projectconfig_db}
      DATABASE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JAVA_TOOL_OPTIONS: ${JAVA_OPTS:--Xms256m -Xmx512m}
      # Local/dev: allow running without gRPC TLS material
      GRPC_SERVER_SECURITY_ENABLED: ${GRPC_SERVER_SECURITY_ENABLED:-false}
      GRPC_CLIENT_DEFAULT_NEGOTIATION_TYPE: ${GRPC_CLIENT_DEFAULT_NEGOTIATION_TYPE:-plaintext}
    ports:
      - "${PROJECT_CONFIG_SERVICE_PORT:-8084}:${PROJECT_CONFIG_SERVICE_PORT:-8084}"
    depends_on:
      postgres-projectconfig:
        condition: service_healthy
      user-group-service:
        condition: service_started
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:$${SERVER_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  sync-service:
    image: samt/sync-service:latest
    build:
      context: .
      dockerfile: sync-service/Dockerfile
    container_name: sync-service
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: ${SYNC_SERVICE_PORT:-8083}
      GRPC_SERVER_PORT: ${SYNC_SERVICE_GRPC_PORT:-9094}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-sync:5432/${DB_SYNC_NAME:-sync_db}?serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?⚠️ REDIS_PASSWORD is required - create .env file}
      JAVA_TOOL_OPTIONS: ${JAVA_OPTS:--Xms256m -Xmx512m}
      # Local/dev: allow running without gRPC TLS material
      GRPC_SERVER_SECURITY_ENABLED: ${GRPC_SERVER_SECURITY_ENABLED:-false}
      GRPC_CLIENT_DEFAULT_NEGOTIATION_TYPE: ${GRPC_CLIENT_DEFAULT_NEGOTIATION_TYPE:-plaintext}
    ports:
      - "${SYNC_SERVICE_PORT:-8083}:${SYNC_SERVICE_PORT:-8083}"
    depends_on:
      postgres-sync:
        condition: service_healthy
      redis:
        condition: service_healthy
      project-config-service:
        condition: service_started
      api-gateway:
        condition: service_started
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:$${SERVER_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  analysis-service:
    image: samt/analysis-service:latest
    build:
      context: .
      dockerfile: analysis-service/Dockerfile
    container_name: analysis-service
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: ${ANALYSIS_SERVICE_PORT:-8087}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-core:5432/${DB_CORE_NAME:-samt_core}?serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?⚠️ REDIS_PASSWORD is required - create .env file}
      JAVA_TOOL_OPTIONS: ${JAVA_OPTS:--Xms256m -Xmx512m}
    ports:
      - "${ANALYSIS_SERVICE_PORT:-8087}:${ANALYSIS_SERVICE_PORT:-8087}"
    depends_on:
      postgres-core:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-gateway:
        condition: service_started
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:$${SERVER_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  report-service:
    image: samt/report-service:latest
    build:
      context: .
      dockerfile: report-service/Dockerfile
    container_name: report-service
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: ${REPORT_SERVICE_PORT:-8088}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-core:5432/${DB_CORE_NAME:-samt_core}?serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?⚠️ REDIS_PASSWORD is required - create .env file}
      JAVA_TOOL_OPTIONS: ${JAVA_OPTS:--Xms256m -Xmx512m}
    ports:
      - "${REPORT_SERVICE_PORT:-8088}:${REPORT_SERVICE_PORT:-8088}"
    depends_on:
      postgres-core:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-gateway:
        condition: service_started
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:$${SERVER_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  notification-service:
    image: samt/notification-service:latest
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: ${NOTIFICATION_SERVICE_PORT:-8085}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-core:5432/${DB_CORE_NAME:-samt_core}?serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?⚠️ REDIS_PASSWORD is required - create .env file}
      JAVA_TOOL_OPTIONS: ${JAVA_OPTS:--Xms256m -Xmx512m}
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8085}:${NOTIFICATION_SERVICE_PORT:-8085}"
    depends_on:
      postgres-core:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-gateway:
        condition: service_started
    networks:
      - samt-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:$${SERVER_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

# ========================================
#   NETWORKS & VOLUMES
# ========================================

networks:
  samt-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  identity_data:
    driver: local
  core_data:
    driver: local
